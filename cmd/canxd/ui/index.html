<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CanX Control Plane</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>CanX Control Plane</h1>
      <p>Runs, tasks, sessions, context, and event detail.</p>
    </div>
    <button id="refresh">Refresh</button>
  </header>

  <main class="shell">
    <aside class="panel">
      <h2>Runs</h2>
      <div id="runs" class="run-list"></div>
    </aside>

    <section class="content">
      <section class="panel summary-grid">
        <div class="summary-card">
          <div class="label">Run</div>
          <div id="run-summary" class="value">Select a run</div>
        </div>
        <div class="summary-card">
          <div class="label">Session</div>
          <div id="session-summary" class="value">—</div>
        </div>
        <div class="summary-card">
          <div class="label">Tasks</div>
          <div id="task-summary" class="value">—</div>
        </div>
      </section>

      <section class="two-column">
        <section class="panel">
          <h2>Tasks</h2>
          <div id="tasks" class="task-list"></div>
          <h3>Task detail</h3>
          <pre id="task-detail">Select a task.</pre>
        </section>

        <section class="panel">
          <h2>Sessions</h2>
          <div id="sessions" class="task-list"></div>
          <h3>Session detail</h3>
          <div id="session-detail" class="detail-stack">Select a run.</div>
        </section>
      </section>

      <section class="two-column">
        <section class="panel">
          <h2>Context</h2>
          <div id="context-tabs" class="tabs"></div>
          <div id="context-highlights" class="detail-stack"></div>
          <div id="docs-list" class="task-list compact-list"></div>
          <pre id="context-detail">Select a run.</pre>
        </section>

        <section class="panel">
          <h2>Events</h2>
          <pre id="events">Select a run.</pre>
        </section>
      </section>

      <section class="panel">
        <h2>Actions</h2>
        <pre id="actions">Select a run.</pre>
      </section>

      <section class="two-column">
        <section class="panel">
          <h2>Rooms</h2>
          <div id="rooms" class="task-list"></div>
        </section>
        <section class="panel">
          <h2>Messages</h2>
          <form id="room-form" class="room-form">
            <input id="room-message" type="text" placeholder="e.g. adjust strategy, add reviewer note">
            <button type="submit">Post</button>
          </form>
          <pre id="room-messages">Select a room.</pre>
        </section>
      </section>
    </section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
