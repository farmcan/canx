<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CanX Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>CanX Dashboard</h1>
    <p>Runs, tasks, and raw event stream.</p>
  </header>
  <main class="layout">
    <section>
      <h2>Runs</h2>
      <ul id="runs"></ul>
    </section>
    <section>
      <h2>Run Detail</h2>
      <pre id="run-detail">Select a run.</pre>
      <h3>Events</h3>
      <pre id="events"></pre>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
